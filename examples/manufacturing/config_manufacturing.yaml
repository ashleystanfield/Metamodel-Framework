# Manufacturing Queueing Example Configuration
# Models production outcomes for 16 product types using queueing theory principles

project:
  name: "Manufacturing_Queueing_Example"
  working_directory: "."
  output_directory: "results_manufacturing"
  log_file: "manufacturing_example.log"

data:
  input_files:
    - name: "manufacturing_data"
      path: "examples/manufacturing/manufacturing_data.csv"
      enabled: true

  person_id_column: "person_idx"

  missing_data:
    strategy: "complete_cases"

variables:
  predictors:
    # Production Line
    - "arrival_rate"
    - "service_rate"
    - "wip_inventory"
    # Job Shop Scheduling
    - "num_operations"
    - "setup_time"
    - "due_date_tightness"
    # Maintenance
    - "machine_age"
    - "maintenance_interval"
    - "technician_availability"
    # Supply Chain
    - "supplier_lead_time"
    - "inventory_level"
    - "demand_variability"

  outcomes:
    - "cycle_time"
    - "throughput"
    - "on_time_delivery"
    - "unit_cost"

  column_mapping:
    enabled: false

modeling:
  random_seed: 42
  train_test_split: 0.75
  drop_constant_predictors: true
  save_models: true
  export_predictions: true
  use_population_weights: true

metamodels:
  linear_regression:
    enabled: true

  neural_network:
    enabled: true
    tune_hyperparameters: true
    tune_size_grid: [5, 10, 15]
    tune_decay_grid: [0.001, 0.01, 0.1]
    size: 10
    decay: 0.01
    max_iterations: 300

  random_forest:
    enabled: true
    tune_hyperparameters: true
    tune_ntree_grid: [100, 300, 500]
    tune_mtry_grid: [3, 4, 5]
    ntree: 300
    nodesize: 3

population_weighting:
  weights_file: "examples/population_weights/manufacturing_weights.csv"
  person_id_column: "person_idx"
  weight_column: "population_proportion"

prediction:
  scenario_file: "examples/scenarios/manufacturing_scenarios.csv"
  export_predictions_csv: true

ensemble:
  enabled: true
  method: "weighted_average"
  weighting_metric: "mean_test_r2"

visualizations:
  enabled: true

logging:
  verbose: true
  progress_bars: true
  log_to_file: true

validation:
  minimum_sample_size: 4
